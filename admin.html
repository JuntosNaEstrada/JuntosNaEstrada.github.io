<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gerenciar viagens | BL</title><link rel="icon" href="favicon.svg" type="image/svg+xml"><link rel="stylesheet" href="styles.css?v=4"></head><body class="adminPage"><header class="topbar"><a class="brand" href="index.html"><span class="logo">BL</span><span><b>Benicio & Leticia</b><small>GERENCIAR VIAGENS</small></span></a><nav><a href="index.html">← Voltar ao site</a></nav><button class="linkBtn" onclick="signOut()">Sair</button></header><main class="admin"><section class="adminHead"><div><p class="eyebrow">PAINEL DO CASAL</p><h1>Gerenciar viagens</h1><p>Cadastre destinos e transforme passeios em memórias completas.</p></div><div class="adminActions"><button id="seedBtn" class="secondary">Importar os 100 destinos</button><button id="newBtn" class="primary">＋ Nova viagem</button></div></section><div class="adminLayout"><aside><input id="adminSearch" placeholder="Buscar viagem…"><div id="tripList" class="tripList"></div></aside><section id="editor" class="editor"><div class="emptyEditor"><span class="logo big">BL</span><h2>Selecione ou crie uma viagem</h2><p>Somente usuários autenticados podem alterar dados e fotografias.</p></div></section></div></main>
<template id="formTemplate"><form id="tripForm"><input type="hidden" name="id"><div class="formTitle"><div><p class="eyebrow">REGISTRO DE VIAGEM</p><h2 id="formHeading">Nova viagem</h2></div><button type="button" id="deleteBtn" class="danger hidden">Excluir</button></div><div class="formGrid"><label>Cidade *<input name="city" required></label><label>Destino / ponto *<input name="title" required></label><label>Distância<select name="distance_range"><option>0–30 km</option><option>31–60 km</option><option>61–90 km</option><option>91–120 km</option><option>121–150 km</option><option>151–180 km</option><option>181–220 km</option><option>221–250 km</option></select></label><label>Dificuldade<select name="difficulty"><option>Fácil</option><option>Moderado</option><option>Difícil</option></select></label><label class="wide">Motivo<input name="motivation" placeholder="Nascer do sol · vista"></label><label class="wide">O que encontrar<textarea name="highlights"></textarea></label><label>Acesso<input name="access"></label><label>Melhor momento<input name="best_time"></label><label>Status<select name="status" id="statusSelect"><option value="planned">Queremos conhecer</option><option value="completed">Já conhecemos</option></select></label><label>Data da viagem<input name="visit_date" type="date"></label><label>Quilometragem total<input name="total_km" type="number" min="0" placeholder="km"></label><label>Avaliação<select name="rating"><option value="">Sem nota</option><option value="5">★★★★★</option><option value="4">★★★★</option><option value="3">★★★</option><option value="2">★★</option><option value="1">★</option></select></label><label class="wide">Nossa lembrança<textarea name="notes" placeholder="O que mais gostamos? Qual história queremos guardar?"></textarea></label><label class="wide fileBox">Adicionar fotografias<input id="photoInput" type="file" accept="image/*" multiple><span>Selecionar imagens · até 8 MB cada</span></label><div id="photoGallery" class="photoGallery wide"></div></div><p id="formError" class="error"></p><div class="formButtons"><a class="secondary" href="index.html">Ver site</a><button class="primary">Salvar viagem</button></div></form></template>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="auth.js?v=4"></script><script src="admin.js?v=4"></script></body></html>

<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Acesso | BL na Estrada</title><link rel="stylesheet" href="styles.css"></head>
<body class="loginPage"><main class="loginWrap"><section class="loginPhoto"><img src="assets/casal-moto.jpeg" alt="Benicio e Leticia com a moto"><div class="loginQuote">A estrada é melhor quando seguimos juntos.</div></section><section class="loginCard"><div class="logo big">BL</div><p class="eyebrow">DIÁRIO PARTICULAR</p><h1>Benicio & Leticia<br><em>na estrada</em></h1><p class="muted">Entre para acessar nossos destinos, fotografias e memórias.</p><div id="setupAlert" class="alert hidden"><b>Configuração pendente</b><br>Preencha o arquivo <code>config.js</code> conforme o guia de instalação.</div><form id="loginForm"><label>Usuário<input id="username" autocomplete="username" value="Benicio e Leticia" required></label><label>Senha<input id="password" type="password" autocomplete="current-password" required placeholder="Digite a senha"></label><p id="error" class="error"></p><button class="primary full">Entrar no nosso diário</button></form><small class="privacy">🔒 Conteúdo protegido por autenticação.</small></section></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="auth.js"></script><script>if(new URLSearchParams(location.search).has('setup'))setupAlert.classList.remove('hidden');loginForm.onsubmit=async e=>{e.preventDefault();error.textContent='';if(!configured){setupAlert.classList.remove('hidden');return}if(username.value.trim()!==cfg.DISPLAY_USERNAME){error.textContent='Usuário incorreto.';return}const {error:err}=await supabase.auth.signInWithPassword({email:cfg.AUTH_EMAIL,password:password.value});if(err){error.textContent='Senha incorreta ou acesso não configurado.';return}location.replace(new URLSearchParams(location.search).get('next')||'index.html')};(async()=>{if(configured&&(await supabase.auth.getSession()).data.session)location.replace('index.html')})();</script></body></html>
